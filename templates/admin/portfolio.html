<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #f3f4f6; }
        .sidebar { position: fixed; left: 0; top: 0; width: 260px; height: 100vh; background: #0a2463; color: white; padding: 30px 20px; }
        .sidebar-logo { display: flex; align-items: center; gap: 12px; font-size: 24px; font-weight: 700; margin-bottom: 40px; }
        .sidebar-logo .icon { width: 45px; height: 45px; background: linear-gradient(135deg, #fca311 0%, #ffb732 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #0f0f0f; }
        .nav-links { list-style: none; }
        .nav-links li { margin-bottom: 8px; }
        .nav-links a { display: flex; align-items: center; gap: 12px; padding: 14px 18px; color: #d1d5db; text-decoration: none; border-radius: 10px; transition: 0.3s; font-weight: 500; }
        .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.1); color: white; }
        .main-content { margin-left: 260px; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { font-size: 1.8rem; color: #0f0f0f; }
        .btn { padding: 12px 24px; background: linear-gradient(135deg, #fca311 0%, #ffb732 100%); border: none; border-radius: 10px; font-weight: 600; cursor: pointer; color: #0f0f0f; font-size: 14px; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 20px; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .portfolio-item { border-radius: 12px; overflow: hidden; background: #f9fafb; }
        .portfolio-item img { width: 100%; height: 150px; object-fit: cover; }
        .portfolio-item .info { padding: 15px; }
        .portfolio-item h4 { font-size: 1rem; margin-bottom: 5px; color: #0f0f0f; }
        .portfolio-item p { font-size: 13px; color: #6b7280; margin-bottom: 10px; }
        .portfolio-item .category { display: inline-block; padding: 4px 10px; background: rgba(252, 163, 17, 0.1); color: #e08f0e; border-radius: 50px; font-size: 11px; font-weight: 600; }
        .portfolio-item .actions { display: flex; gap: 8px; padding: 0 15px 15px; }
        .actions button { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .actions .delete { background: #ef4444; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 500px; max-width: 90%; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .modal-header button { background: none; border: none; font-size: 24px; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: #374151; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; }
        @media (max-width: 1024px) { .portfolio-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } .portfolio-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo"><div class="icon"><i class="fas fa-chart-line"></i></div><span>Lightline</span></div>
        <ul class="nav-links">
            <li><a href="/admin/dashboard"><i class="fas fa-home"></i> Dashboard</a></li>
            <li><a href="/admin/contacts"><i class="fas fa-envelope"></i> Contacts</a></li>
            <li><a href="/admin/services"><i class="fas fa-briefcase"></i> Services</a></li>
            <li><a href="/admin/portfolio" class="active"><i class="fas fa-folder-open"></i> Portfolio</a></li>
            <li><a href="/admin/subscribers"><i class="fas fa-users"></i> Subscribers</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="header">
            <h1>Portfolio Management</h1>
            <button class="btn" onclick="openModal()"><i class="fas fa-plus"></i> Add Project</button>
        </div>

        <div class="card">
            <div class="portfolio-grid">
                {% for item in portfolio %}
                <div class="portfolio-item">
                    <img src="{{ item.image_url }}" alt="{{ item.title }}">
                    <div class="info">
                        <h4>{{ item.title }}</h4>
                        <p>{{ item.description[:60] }}...</p>
                        <span class="category">{{ item.category }}</span>
                    </div>
                    <div class="actions">
                        <form method="POST" style="display:inline;"><input type="hidden" name="action" value="delete"><input type="hidden" name="id" value="{{ item.id }}"><button type="submit" class="delete" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></button></form>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </main>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Project</h3>
                <button onclick="closeModal()">&times;</button>
            </div>
            <form method="POST">
                <input type="hidden" name="action" value="add">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" name="title" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" name="image_url" placeholder="https://images.unsplash.com/..." required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" name="category" placeholder="Tech, Real Estate, etc." required>
                </div>
                <div class="form-group">
                    <label>Link</label>
                    <input type="text" name="link" placeholder="#">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Add Project</button>
            </form>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('addModal').classList.add('active'); }
        function closeModal() { document.getElementById('addModal').classList.remove('active'); }
    </script>
</body>
</html>
